<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agroquímica San Bernardo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #f4f7fb; color: #1b2430; }
    .hidden { display: none !important; }

    .pantalla {
      min-height: 100vh;
      padding: 18px;
    }

    .card {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 18px;
    }

    .logo h1 {
      font-size: 28px;
      color: #215732;
      margin-bottom: 6px;
    }

    .logo p {
      color: #667085;
      font-size: 14px;
    }

    .titulo {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #215732;
      text-align: center;
    }

    .subtitulo {
      text-align: center;
      color: #667085;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .loading-box {
      max-width: 520px;
      margin: 80px auto 0;
      text-align: center;
      background: #fff;
      border-radius: 18px;
      padding: 28px 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .spinner {
      width: 56px;
      height: 56px;
      border: 6px solid #d9e6dd;
      border-top-color: #215732;
      border-radius: 50%;
      margin: 0 auto 18px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .users-grid,
    .menu-grid,
    .productos-grid {
      display: grid;
      gap: 12px;
    }

    .users-grid {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .menu-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-top: 18px;
    }

    .productos-grid {
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      margin-top: 16px;
    }

    .user-btn,
    .menu-btn,
    .btn {
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .user-btn {
      background: #fff;
      border: 2px solid #d9e6dd;
      padding: 16px 10px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: #1b2430;
    }

    .user-btn:hover,
    .menu-btn:hover,
    .btn:hover {
      transform: translateY(-1px);
    }

    .user-icon {
      display: block;
      font-size: 34px;
      margin-bottom: 8px;
    }

    .user-rol {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: #667085;
      font-weight: 400;
    }

    .pin-box {
      max-width: 420px;
      margin: 0 auto;
      text-align: center;
    }

    .pin-display {
      font-size: 34px;
      letter-spacing: 8px;
      font-weight: 700;
      color: #215732;
      margin: 18px 0;
      min-height: 42px;
    }

    .pin-display.error {
      color: #c53030;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 320px;
      margin: 0 auto;
    }

    .key {
      background: #215732;
      color: #fff;
      font-size: 24px;
      padding: 18px 0;
      border-radius: 16px;
      border: none;
      cursor: pointer;
    }

    .key.alt {
      background: #8b3a3a;
    }

    .key.gray {
      background: #667085;
    }

    .topbar {
      background: #215732;
      color: #fff;
      padding: 14px 16px;
      border-radius: 14px;
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .topbar h2 {
      font-size: 20px;
    }

    .topbar .info {
      font-size: 14px;
      opacity: 0.95;
    }

    .btn {
      background: #215732;
      color: #fff;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
    }

    .btn.secondary {
      background: #667085;
    }

    .btn.danger {
      background: #b42318;
    }

    .btn.light {
      background: #e7efe9;
      color: #215732;
    }

    .btn.full {
      width: 100%;
    }

    .section-title {
      font-size: 22px;
      color: #215732;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .section-subtitle {
      font-size: 14px;
      color: #667085;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 14px;
      color: #344054;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #cfd8e3;
      font-size: 14px;
      background: #fff;
    }

    .form-group textarea {
      min-height: 90px;
      resize: vertical;
    }

    .producto-card,
    .resumen-card,
    .mini-card {
      border: 1px solid #d9e6dd;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .producto-card h4,
    .resumen-card h4,
    .mini-card h4 {
      color: #215732;
      margin-bottom: 8px;
      font-size: 17px;
    }

    .producto-card p,
    .mini-card p,
    .resumen-card p {
      font-size: 14px;
      color: #475467;
      margin-bottom: 6px;
    }

    .acciones-inline {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tabla-wrap {
      overflow-x: auto;
      margin-top: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #e4e7ec;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f0f5f2;
      color: #215732;
      font-weight: 700;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #e7efe9;
      color: #215732;
    }

    .pill.red {
      background: #fdecec;
      color: #b42318;
    }

    .pill.gray {
      background: #eef2f6;
      color: #475467;
    }

    .carrito-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #eef2f6;
      padding: 10px 0;
    }

    .carrito-item:last-child {
      border-bottom: none;
    }

    .vacio {
      text-align: center;
      color: #667085;
      padding: 20px 0;
    }

    .alerta {
      margin: 12px 0;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .alerta.ok {
      background: #e8f7ec;
      color: #156f2d;
    }

    .alerta.error {
      background: #fdecec;
      color: #b42318;
    }

    .footer-space {
      height: 20px;
    }

    @media (max-width: 640px) {
      .topbar {
        align-items: flex-start;
      }

      .pin-display {
        font-size: 28px;
      }

      .key {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div id="pantalla-loading" class="pantalla">
    <div class="loading-box">
      <div class="spinner"></div>
      <div class="titulo">Agroquímica San Bernardo</div>
      <div class="subtitulo">Conectando con el sistema...</div>
    </div>
  </div>

  <div id="pantalla-seleccion" class="pantalla hidden">
    <div class="card">
      <div class="logo">
        <h1>Agroquímica San Bernardo</h1>
        <p>Sistema interno</p>
      </div>
      <div class="titulo">Seleccioná tu usuario</div>
      <div class="subtitulo">Elegí quién ingresa al sistema</div>
      <div id="users-grid" class="users-grid"></div>
    </div>
  </div>

  <div id="pantalla-pin" class="pantalla hidden">
    <div class="card pin-box">
      <div id="pin-titulo" class="titulo">Hola</div>
      <div id="pin-user" class="subtitulo">Ingresá tu PIN</div>
      <div id="pin-display" class="pin-display">_ _ _ _</div>

      <div class="keypad">
        <button class="key" onclick="agregarDigito('1')">1</button>
        <button class="key" onclick="agregarDigito('2')">2</button>
        <button class="key" onclick="agregarDigito('3')">3</button>
        <button class="key" onclick="agregarDigito('4')">4</button>
        <button class="key" onclick="agregarDigito('5')">5</button>
        <button class="key" onclick="agregarDigito('6')">6</button>
        <button class="key" onclick="agregarDigito('7')">7</button>
        <button class="key" onclick="agregarDigito('8')">8</button>
        <button class="key" onclick="agregarDigito('9')">9</button>
        <button class="key alt" onclick="cancelarPin()">↩</button>
        <button class="key" onclick="agregarDigito('0')">0</button>
        <button class="key gray" onclick="borrarDigito()">⌫</button>
      </div>
    </div>
  </div>

  <div id="pantalla-app" class="pantalla hidden">
    <div class="card">
      <div class="topbar">
        <div>
          <h2>Agroquímica San Bernardo</h2>
          <div id="user-info-display" class="info">Usuario</div>
        </div>
        <div class="acciones-inline">
          <button class="btn light" onclick="mostrarMenu()">Menú</button>
          <button class="btn danger" onclick="logout()">Salir</button>
        </div>
      </div>

      <div id="alertas"></div>

      <div id="vista-menu">
        <div class="section-title">Menú principal</div>
        <div class="section-subtitle">Elegí una acción para continuar</div>
        <div id="menu-grid" class="menu-grid"></div>
      </div>

      <div id="vista-contenido" class="hidden"></div>
      <div class="footer-space"></div>
    </div>
  </div>

  <script>
    const API = 'https://agroquimicav2-production.up.railway.app';    let empleados = [];
    let productos = [];
    let usuarioSeleccionado = null;
    let usuarioActual = null;
    let pinIngresado = '';
    let carrito = [];
    let modoOperacion = 'venta';

    function rolSeguro(valor = '') {
      return String(valor)
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toLowerCase();
    }

    const menus = {
      mostrador: [
        { icon: '🛒', label: 'Nueva venta', action: 'nuevaVenta' },
        { icon: '📄', label: 'Presupuesto', action: 'nuevoPresupuesto' },
        { icon: '📦', label: 'Ver stock', action: 'verStock' },
        { icon: '🔎', label: 'Buscar producto', action: 'buscarProducto' }
      ],
      caja: [
        { icon: '💵', label: 'Cobrar venta', action: 'cobrarVenta' },
        { icon: '📊', label: 'Caja del día', action: 'verCaja' },
        { icon: '🧾', label: 'Cierre de caja', action: 'cerrarCaja' }
      ],
      gerente: [
        { icon: '🛒', label: 'Nueva venta', action: 'nuevaVenta' },
        { icon: '📄', label: 'Presupuesto', action: 'nuevoPresupuesto' },
        { icon: '📦', label: 'Ver stock', action: 'verStock' },
        { icon: '💵', label: 'Cobrar venta', action: 'cobrarVenta' },
        { icon: '📊', label: 'Caja del día', action: 'verCaja' },
        { icon: '📈', label: 'Reportes', action: 'verReportes' },
        { icon: '👥', label: 'Clientes', action: 'verClientes' },
        { icon: '📋', label: 'Presupuestos', action: 'verPresupuestos' },
        { icon: '➕', label: 'Cargar producto', action: 'cargarProducto' },
        { icon: '🧑‍🤝‍🧑', label: 'Empleados', action: 'verEmpleados' }
      ],
      dueno: [
        { icon: '🛒', label: 'Nueva venta', action: 'nuevaVenta' },
        { icon: '📄', label: 'Presupuesto', action: 'nuevoPresupuesto' },
        { icon: '📦', label: 'Ver stock', action: 'verStock' },
        { icon: '💵', label: 'Cobrar venta', action: 'cobrarVenta' },
        { icon: '📊', label: 'Caja del día', action: 'verCaja' },
        { icon: '📈', label: 'Reportes', action: 'verReportes' },
        { icon: '👥', label: 'Clientes', action: 'verClientes' },
        { icon: '📋', label: 'Presupuestos', action: 'verPresupuestos' },
        { icon: '➕', label: 'Cargar producto', action: 'cargarProducto' },
        { icon: '🧑‍🤝‍🧑', label: 'Empleados', action: 'verEmpleados' }
      ]
    };

    const nombresRoles = {
      mostrador: 'Mostrador',
      caja: 'Caja',
      gerente: 'Gerente',
      dueno: 'Dueño'
    };

    const iconosRoles = {
      mostrador: '👤',
      caja: '💵',
      gerente: '🧾',
      dueno: '👑'
    };

    function nombreRol(rol) {
      const r = rolSeguro(rol);
      return nombresRoles[r] || rol || 'Usuario';
    }

    function iconoRol(rol) {
      const r = rolSeguro(rol);
      return iconosRoles[r] || '👤';
    }

    function mostrarAlerta(texto, tipo = 'ok') {
      const box = document.getElementById('alertas');
      box.innerHTML = '<div class="alerta ' + tipo + '">' + texto + '</div>';
      setTimeout(() => {
        if (box.innerHTML.includes(texto)) box.innerHTML = '';
      }, 3500);
    }

    async function api(path, options = {}) {
      const config = {
        method: options.method || 'GET',
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      };

      if (options.body) {
        config.body = JSON.stringify(options.body);
      }

      const res = await fetch(API + path, config);
      const text = await res.text();
      let data = {};

      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!res.ok) {
        throw new Error(data.error || 'Error en el servidor');
      }

      return data;
    }

    async function init() {
      try {
        empleados = await api('/api/empleados');
        document.getElementById('pantalla-loading').classList.add('hidden');
        document.getElementById('pantalla-seleccion').classList.remove('hidden');
        renderUsuarios();
      } catch (err) {
        document.getElementById('pantalla-loading').innerHTML = `
          <div class="loading-box">
            <div class="titulo">No se pudo conectar</div>
            <div class="subtitulo">${err.message}</div>
          </div>
        `;
      }
    }

    function renderUsuarios() {
      const grid = document.getElementById('users-grid');
      grid.innerHTML = '';

      if (!empleados.length) {
        grid.innerHTML = '<div class="vacio">No hay empleados activos cargados.</div>';
        return;
      }

      empleados.forEach(emp => {
        const btn = document.createElement('button');
        btn.className = 'user-btn';
        btn.innerHTML = `
          <span class="user-icon">${iconoRol(emp.rol)}</span>
          ${emp.nombre}
          <span class="user-rol">${nombreRol(emp.rol)}</span>
        `;
        btn.onclick = () => seleccionarUsuario(emp);
        grid.appendChild(btn);
      });
    }

    function seleccionarUsuario(emp) {
      usuarioSeleccionado = emp;
      pinIngresado = '';
      document.getElementById('pin-titulo').textContent = 'Hola ' + emp.nombre;
      document.getElementById('pin-user').textContent = nombreRol(emp.rol) + ' — Ingresá tu PIN';
      actualizarPinDisplay();
      document.getElementById('pantalla-seleccion').classList.add('hidden');
      document.getElementById('pantalla-pin').classList.remove('hidden');
    }

    function cancelarPin() {
      usuarioSeleccionado = null;
      pinIngresado = '';
      document.getElementById('pantalla-pin').classList.add('hidden');
      document.getElementById('pantalla-seleccion').classList.remove('hidden');
    }

    function actualizarPinDisplay() {
      const display = document.getElementById('pin-display');
      display.classList.remove('error');
      let texto = '';
      for (let i = 0; i < 4; i++) {
        texto += i < pinIngresado.length ? '●' : '_';
        if (i < 3) texto += ' ';
      }
      display.textContent = texto;
    }

    function agregarDigito(digito) {
      if (pinIngresado.length >= 4) return;
      pinIngresado += digito;
      actualizarPinDisplay();
      if (pinIngresado.length === 4) {
        setTimeout(verificarPin, 150);
      }
    }

    function borrarDigito() {
      pinIngresado = pinIngresado.slice(0, -1);
      actualizarPinDisplay();
    }

    async function verificarPin() {
      try {
        const data = await api('/api/login', {
          method: 'POST',
          body: {
            empleadoId: usuarioSeleccionado.id,
            pin: pinIngresado
          }
        });

        usuarioActual = data;
        document.getElementById('user-info-display').textContent =
          data.nombre + ' — ' + nombreRol(data.rol);

        document.getElementById('pantalla-pin').classList.add('hidden');
        document.getElementById('pantalla-app').classList.remove('hidden');

        pinIngresado = '';
        carrito = [];
        mostrarMenu();
      } catch (err) {
        const display = document.getElementById('pin-display');
        display.classList.add('error');
        display.textContent = 'ERROR';
        setTimeout(() => {
          pinIngresado = '';
          actualizarPinDisplay();
        }, 700);
      }
    }

    function logout() {
      usuarioActual = null;
      usuarioSeleccionado = null;
      pinIngresado = '';
      carrito = [];
      document.getElementById('vista-contenido').innerHTML = '';
      document.getElementById('pantalla-app').classList.add('hidden');
      document.getElementById('pantalla-seleccion').classList.remove('hidden');
      mostrarAlerta('Sesión cerrada', 'ok');
    }

    function mostrarMenu() {
      document.getElementById('vista-contenido').classList.add('hidden');
      document.getElementById('vista-menu').classList.remove('hidden');

      const rol = rolSeguro(usuarioActual?.rol);
      const items = menus[rol] || menus.mostrador;
      const grid = document.getElementById('menu-grid');
      grid.innerHTML = '';

      items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'menu-btn';
        btn.innerHTML = `<span class="user-icon" style="font-size:28px;margin-bottom:6px;">${item.icon}</span>${item.label}`;
        btn.onclick = () => {
          if (typeof window[item.action] === 'function') {
            window[item.action]();
          }
        };
        grid.appendChild(btn);
      });
    }

    function mostrarVista(html) {
      document.getElementById('vista-menu').classList.add('hidden');
      const cont = document.getElementById('vista-contenido');
      cont.classList.remove('hidden');
      cont.innerHTML = html;
    }

    async function cargarProductosDesdeAPI() {
      productos = await api('/api/productos');
      return productos;
    }

    function dinero(valor) {
      return '$' + Number(valor || 0).toLocaleString('es-AR');
    }

    function fechaBonita(valor) {
      if (!valor) return '-';
      return new Date(valor).toLocaleString('es-AR');
    }

    function carritoTotal() {
      return carrito.reduce((acc, item) => acc + item.precio * item.cantidad, 0);
    }

    function agregarAlCarrito(idProducto) {
      const prod = productos.find(p => p.id === idProducto);
      if (!prod) return;

      const existente = carrito.find(x => x.productoId === prod.id);
      if (existente) {
        if (existente.cantidad < prod.stock) {
          existente.cantidad += 1;
        }
      } else {
        if (prod.stock > 0) {
          carrito.push({
            productoId: prod.id,
            nombre: prod.nombre,
            precio: Number(prod.precio),
            cantidad: 1,
            stock: Number(prod.stock)
          });
        }
      }

      renderCarrito();
    }

    function restarDelCarrito(idProducto) {
      const item = carrito.find(x => x.productoId === idProducto);
      if (!item) return;

      item.cantidad -= 1;
      if (item.cantidad <= 0) {
        carrito = carrito.filter(x => x.productoId !== idProducto);
      }

      renderCarrito();
    }

    function renderCarrito() {
      const cont = document.getElementById('carrito-box');
      if (!cont) return;

      if (!carrito.length) {
        cont.innerHTML = '<div class="vacio">Todavía no agregaste productos.</div>';
        return;
      }

      cont.innerHTML = `
        ${carrito.map(item => `
          <div class="carrito-item">
            <div>
              <strong>${item.nombre}</strong><br>
              <span>${dinero(item.precio)} x ${item.cantidad}</span>
            </div>
            <div class="acciones-inline">
              <button class="btn secondary" onclick="restarDelCarrito(${item.productoId})">-</button>
              <button class="btn" onclick="agregarAlCarrito(${item.productoId})">+</button>
            </div>
          </div>
        `).join('')}
        <div style="margin-top:12px;font-weight:700;font-size:18px;color:#215732;">
          Total: ${dinero(carritoTotal())}
        </div>
      `;
    }

    async function nuevaVenta() {
      modoOperacion = 'venta';
      await cargarProductosDesdeAPI();
      carrito = [];

      mostrarVista(`
        <div class="section-title">Nueva venta</div>
        <div class="section-subtitle">Elegí productos y cargá los datos del comprador si querés.</div>

        <div class="form-grid">
          <div class="form-group">
            <label>Nombre del comprador</label>
            <input id="cliente-nombre" placeholder="Opcional">
          </div>
          <div class="form-group">
            <label>Teléfono del comprador</label>
            <input id="cliente-telefono" placeholder="Opcional">
          </div>
        </div>

        <div class="productos-grid">
          ${productos.map(p => `
            <div class="producto-card">
              <h4>${p.nombre}</h4>
              <p><strong>Precio:</strong> ${dinero(p.precio)}</p>
              <p><strong>Stock:</strong> ${p.stock}</p>
              <div class="acciones-inline">
                <button class="btn ${Number(p.stock) <= 0 ? 'secondary' : ''}" ${Number(p.stock) <= 0 ? 'disabled' : ''} onclick="agregarAlCarrito(${p.id})">
                  ${Number(p.stock) <= 0 ? 'Sin stock' : 'Agregar'}
                </button>
              </div>
            </div>
          `).join('')}
        </div>

        <div style="margin-top:20px;" class="resumen-card">
          <h4>Carrito</h4>
          <div id="carrito-box"></div>
          <div class="acciones-inline" style="margin-top:14px;">
            <button class="btn full" onclick="guardarOperacion()">Guardar venta</button>
          </div>
        </div>
      `);

      renderCarrito();
    }

    async function nuevoPresupuesto() {
      modoOperacion = 'presupuesto';
      await cargarProductosDesdeAPI();
      carrito = [];

      mostrarVista(`
        <div class="section-title">Nuevo presupuesto</div>
        <div class="section-subtitle">Para presupuesto el teléfono del comprador es obligatorio.</div>

        <div class="form-grid">
          <div class="form-group">
            <label>Nombre del comprador</label>
            <input id="cliente-nombre" placeholder="Nombre">
          </div>
          <div class="form-group">
            <label>Teléfono del comprador</label>
            <input id="cliente-telefono" placeholder="Teléfono">
          </div>
        </div>

        <div class="productos-grid">
          ${productos.map(p => `
            <div class="producto-card">
              <h4>${p.nombre}</h4>
              <p><strong>Precio:</strong> ${dinero(p.precio)}</p>
              <p><strong>Stock:</strong> ${p.stock}</p>
              <div class="acciones-inline">
                <button class="btn" onclick="agregarAlCarrito(${p.id})">Agregar</button>
              </div>
            </div>
          `).join('')}
        </div>

        <div style="margin-top:20px;" class="resumen-card">
          <h4>Carrito</h4>
          <div id="carrito-box"></div>
          <div class="acciones-inline" style="margin-top:14px;">
            <button class="btn full" onclick="guardarOperacion()">Guardar presupuesto</button>
          </div>
        </div>
      `);

      renderCarrito();
    }

    async function guardarOperacion() {
      try {
        if (!carrito.length) {
          mostrarAlerta('Agregá al menos un producto.', 'error');
          return;
        }

        const nombre = document.getElementById('cliente-nombre')?.value?.trim() || '';
        const telefono = document.getElementById('cliente-telefono')?.value?.trim() || '';

        if (modoOperacion === 'presupuesto' && !telefono) {
          mostrarAlerta('Para presupuesto cargá el teléfono.', 'error');
          return;
        }

        const body = {
          vendedorId: usuarioActual.id,
          items: carrito.map(x => ({
            productoId: x.productoId,
            cantidad: x.cantidad
          })),
          cliente: telefono || nombre ? { nombre, telefono } : null
        };

        if (modoOperacion === 'venta') {
          await api('/api/ventas', { method: 'POST', body });
          mostrarAlerta('Venta guardada correctamente.');
        } else {
          await api('/api/presupuestos', { method: 'POST', body });
          mostrarAlerta('Presupuesto guardado correctamente.');
        }

        carrito = [];
        mostrarMenu();
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    async function verStock() {
      try {
        const lista = await cargarProductosDesdeAPI();

        mostrarVista(`
          <div class="section-title">Stock</div>
          <div class="section-subtitle">Listado completo de productos.</div>
          <div class="tabla-wrap">
            <table>
              <thead>
                <tr>
                  <th>Producto</th>
                  <th>Precio</th>
                  <th>Stock</th>
                </tr>
              </thead>
              <tbody>
                ${lista.map(p => `
                  <tr>
                    <td>${p.nombre}</td>
                    <td>${dinero(p.precio)}</td>
                    <td>${p.stock}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `);
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    async function buscarProducto() {
      try {
        await cargarProductosDesdeAPI();

        mostrarVista(`
          <div class="section-title">Buscar producto</div>
          <div class="section-subtitle">Escribí parte del nombre.</div>
          <div class="form-group">
            <label>Buscar</label>
            <input id="buscador-producto" placeholder="Ej: glifosato" oninput="filtrarProductos()">
          </div>
          <div id="resultado-busqueda" class="productos-grid" style="margin-top:16px;"></div>
        `);

        filtrarProductos();
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    function filtrarProductos() {
      const termino = (document.getElementById('buscador-producto')?.value || '').toLowerCase().trim();
      const lista = productos.filter(p => p.nombre.toLowerCase().includes(termino));
      const box = document.getElementById('resultado-busqueda');

      box.innerHTML = lista.length
        ? lista.map(p => `
            <div class="producto-card">
              <h4>${p.nombre}</h4>
              <p><strong>Precio:</strong> ${dinero(p.precio)}</p>
              <p><strong>Stock:</strong> ${p.stock}</p>
            </div>
          `).join('')
        : '<div class="vacio">No se encontraron productos.</div>';
    }

    async function cobrarVenta() {
      try {
        const ventas = await api('/api/ventas?estado=pendiente_de_cobro');

        mostrarVista(`
          <div class="section-title">Cobrar ventas</div>
          <div class="section-subtitle">Ventas pendientes de cobro.</div>

          ${ventas.length ? ventas.map(v => `
            <div class="mini-card" style="margin-bottom:12px;">
              <h4>Venta #${v.id}</h4>
              <p><strong>Total:</strong> ${dinero(v.total)}</p>
              <p><strong>Fecha:</strong> ${fechaBonita(v.fecha)}</p>
              <p><strong>Comprador:</strong> ${v.cliente ? v.cliente.nombre : 'Sin cargar'}</p>
              <div class="acciones-inline">
                <button class="btn" onclick="cobrarVentaId(${v.id}, 'efectivo')">Cobrar efectivo</button>
                <button class="btn secondary" onclick="cobrarVentaId(${v.id}, 'transferencia')">Cobrar transferencia</button>
              </div>
            </div>
          `).join('') : '<div class="vacio">No hay ventas pendientes.</div>'}
        `);
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    async function cobrarVentaId(id, formaPago) {
      try {
        await api('/api/ventas/' + id + '/cobrar', {
          method: 'POST',
          body: {
            cobradorId: usuarioActual.id,
            formaPago
          }
        });
        mostrarAlerta('Venta cobrada correctamente.');
        cobrarVenta();
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    async function verCaja() {
      try {
        const caja = await api('/api/caja/hoy');

        mostrarVista(`
          <div class="section-title">Caja del día</div>
          <div class="section-subtitle">Resumen del día actual.</div>

          <div class="form-grid">
            <div class="resumen-card">
              <h4>Ingresos</h4>
              <p style="font-size:22px;font-weight:700;color:#215732;">${dinero(caja.ingresos)}</p>
            </div>
            <div class="resumen-card">
              <h4>Ventas cobradas</h4>
              <p style="font-size:22px;font-weight:700;color:#215732;">${caja.ventas}</p>
            </div>
            <div class="resumen-card">
              <h4>Total</h4>
              <p style="font-size:22px;font-weight:700;color:#215732;">${dinero(caja.total)}</p>
            </div>
          </div>

          <div class="tabla-wrap">
            <table>
              <thead>
                <tr>
                  <th>Venta</th>
                  <th>Fecha cobro</th>
                  <th>Total</th>
                  <th>Comprador</th>
                </tr>
              </thead>
              <tbody>
                ${caja.cobradas.length ? caja.cobradas.map(v => `
                  <tr>
                    <td>#${v.id}</td>
                    <td>${fechaBonita(v.fechaCobro)}</td>
                    <td>${dinero(v.total)}</td>
                    <td>${v.cliente ? v.cliente.nombre : 'Sin cargar'}</td>
                  </tr>
                `).join('') : '<tr><td colspan="4">No hay ventas cobradas hoy.</td></tr>'}
              </tbody>
            </table>
          </div>
        `);
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    async function cerrarCaja() {
      try {
        const cierre = await api('/api/caja/cerrar', {
          method: 'POST',
          body: {}
        });

        mostrarAlerta('Caja cerrada. Total: ' + dinero(cierre.total));
        verCaja();
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    async function verReportes() {
      try {
        const rep = await api('/api/reportes');

        mostrarVista(`
          <div class="section-title">Reportes</div>
          <div class="section-subtitle">Resumen general del sistema.</div>

          <div class="form-grid">
            <div class="resumen-card">
              <h4>Total facturado</h4>
              <p style="font-size:22px;font-weight:700;color:#215732;">${dinero(rep.totalFacturado)}</p>
            </div>
            <div class="resumen-card">
              <h4>Ventas cobradas</h4>
              <p style="font-size:22px;font-weight:700;color:#215732;">${rep.cantidadVentas}</p>
            </div>
            <div class="resumen-card">
              <h4>Compradores</h4>
              <p style="font-size:22px;font-weight:700;color:#215732;">${rep.cantidadClientes}</p>
            </div>
            <div class="resumen-card">
              <h4>Presupuestos</h4>
              <p style="font-size:22px;font-weight:700;color:#215732;">${rep.cantidadPresupuestos}</p>
            </div>
          </div>
        `);
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    async function verClientes() {
      try {
        const clientes = await api('/api/clientes');

        mostrarVista(`
          <div class="section-title">Compradores</div>
          <div class="section-subtitle">Listado de compradores cargados automáticamente.</div>

          <div class="tabla-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Teléfono</th>
                </tr>
              </thead>
              <tbody>
                ${clientes.length ? clientes.map(c => `
                  <tr>
                    <td>${c.nombre}</td>
                    <td>${c.telefono}</td>
                  </tr>
                `).join('') : '<tr><td colspan="2">No hay compradores.</td></tr>'}
              </tbody>
            </table>
          </div>
        `);
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    async function verPresupuestos() {
      try {
        const lista = await api('/api/presupuestos');

        mostrarVista(`
          <div class="section-title">Presupuestos</div>
          <div class="section-subtitle">Historial de presupuestos generados.</div>

          <div class="tabla-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Fecha</th>
                  <th>Comprador</th>
                  <th>Total</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody>
                ${lista.length ? lista.map(p => `
                  <tr>
                    <td>#${p.id}</td>
                    <td>${fechaBonita(p.fecha)}</td>
                    <td>${p.cliente ? p.cliente.nombre : 'Sin cargar'}</td>
                    <td>${dinero(p.total)}</td>
                    <td><span class="pill ${p.estado === 'vencido' ? 'red' : 'gray'}">${p.estado}</span></td>
                  </tr>
                `).join('') : '<tr><td colspan="5">No hay presupuestos.</td></tr>'}
              </tbody>
            </table>
          </div>
        `);
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    async function cargarProducto() {
      mostrarVista(`
        <div class="section-title">Cargar producto</div>
        <div class="section-subtitle">Alta simple de producto.</div>

        <div class="form-grid">
          <div class="form-group">
            <label>Nombre</label>
            <input id="prod-nombre" placeholder="Nombre del producto">
          </div>
          <div class="form-group">
            <label>Precio</label>
            <input id="prod-precio" type="number" step="0.01" placeholder="0">
          </div>
          <div class="form-group">
            <label>Stock</label>
            <input id="prod-stock" type="number" step="1" placeholder="0">
          </div>
        </div>

        <div class="acciones-inline">
          <button class="btn" onclick="guardarProducto()">Guardar producto</button>
        </div>
      `);
    }

    async function guardarProducto() {
      try {
        const nombre = document.getElementById('prod-nombre').value.trim();
        const precio = Number(document.getElementById('prod-precio').value || 0);
        const stock = Number(document.getElementById('prod-stock').value || 0);

        await api('/api/productos', {
          method: 'POST',
          body: { nombre, precio, stock }
        });

        mostrarAlerta('Producto cargado correctamente.');
        verStock();
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    async function verEmpleados() {
      try {
        empleados = await api('/api/empleados');

        mostrarVista(`
          <div class="section-title">Empleados</div>
          <div class="section-subtitle">Alta simple de empleados. El PIN lo resuelve el backend.</div>

          <div class="form-grid">
            <div class="form-group">
              <label>Nombre</label>
              <input id="emp-nombre" placeholder="Nombre">
            </div>
            <div class="form-group">
              <label>Rol</label>
              <select id="emp-rol">
                <option value="mostrador">Mostrador</option>
                <option value="caja">Caja</option>
                <option value="gerente">Gerente</option>
                <option value="dueno">Dueño</option>
              </select>
            </div>
          </div>

          <div class="acciones-inline">
            <button class="btn" onclick="guardarEmpleado()">Guardar empleado</button>
          </div>

          <div class="tabla-wrap" style="margin-top:18px;">
            <table>
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Rol</th>
                </tr>
              </thead>
              <tbody>
                ${empleados.map(e => `
                  <tr>
                    <td>${e.nombre}</td>
                    <td>${nombreRol(e.rol)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `);
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    async function guardarEmpleado() {
      try {
        const nombre = document.getElementById('emp-nombre').value.trim();
        const rol = document.getElementById('emp-rol').value;

        await api('/api/empleados', {
          method: 'POST',
          body: { nombre, rol }
        });

        mostrarAlerta('Empleado guardado correctamente.');
        verEmpleados();
      } catch (err) {
        mostrarAlerta(err.message, 'error');
      }
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
